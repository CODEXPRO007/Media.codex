{% extends 'base.html' %}
{% block title %}Login — MediaVault Pro{% endblock %}
{% block extra_css %}
<style>
.auth-wrap{min-height:calc(100vh - 58px);display:flex;align-items:center;justify-content:center;padding:40px 20px;margin-left:0!important}
.auth-card{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:44px;width:100%;max-width:420px;position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(232,168,56,.12),transparent 70%);pointer-events:none}
.auth-logo{font-size:1.4rem;font-weight:800;margin-bottom:6px}
.auth-logo span{color:var(--gold)}
.auth-sub{font-size:.84rem;color:var(--text2);margin-bottom:32px}
.auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text3);font-size:.78rem}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-footer{text-align:center;margin-top:20px;font-size:.82rem;color:var(--text2)}
.auth-footer a{font-weight:600}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card fade-in">
    <div class="auth-logo">Media<span>Vault</span> <span style="font-size:.7rem;background:var(--gold3);color:var(--gold);padding:2px 8px;border-radius:4px;font-weight:700">PRO</span></div>
    <div class="auth-sub">Sign in to your account</div>
    <form method="post" action="/login">
      <div class="form-group">
        <label>Username or Email</label>
        <input type="text" name="login_id" required autofocus placeholder="john or john@email.com" value="{{ request.form.get('login_id','') }}">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-gold btn-full btn-lg" style="margin-top:8px;">→ Sign In</button>
    </form>
    <div class="auth-divider">or</div>
    <div class="auth-footer">New here? <a href="/register">Create an account →</a></div>
    <div class="auth-footer" style="margin-top:8px;"><a href="/public" style="color:var(--text3);font-size:.78rem;">Browse Public Gallery without login</a></div>
  </div>
</div>
{% endblock %}
