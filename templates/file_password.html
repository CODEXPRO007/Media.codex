{% extends 'base.html' %}
{% block title %}Password Required{% endblock %}
{% block content %}
<div style="max-width:400px;margin:60px auto;text-align:center">
  <div class="card" style="padding:36px">
    <div style="font-size:3rem;margin-bottom:14px">🔒</div>
    <h2 style="font-size:1rem;font-weight:700;margin-bottom:6px">Password Required</h2>
    <p style="font-size:.82rem;color:var(--text2);margin-bottom:20px">This file is password protected.</p>
    <form method="post">
      <div class="form-group"><input type="password" name="file_password" placeholder="Enter file password..." required autofocus></div>
      <button type="submit" class="btn btn-gold btn-full">→ Unlock</button>
    </form>
  </div>
</div>
{% endblock %}
